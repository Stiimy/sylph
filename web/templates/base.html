<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sylph{% endblock %} - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar d-flex flex-column p-3">
            <a href="/" class="d-flex align-items-center mb-3 text-decoration-none">
                <span class="sidebar-brand">SYLPH</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/offers" class="nav-link {% if '/offers' in request.path %}active{% endif %}">
                        <i class="bi bi-briefcase me-2"></i> Offres
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/platforms" class="nav-link {% if '/platforms' in request.path %}active{% endif %}">
                        <i class="bi bi-plug me-2"></i> Plateformes
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/agent" class="nav-link {% if '/agent' in request.path %}active{% endif %}">
                        <i class="bi bi-robot me-2"></i> Agent
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/logs" class="nav-link {% if '/logs' in request.path %}active{% endif %}">
                        <i class="bi bi-terminal me-2"></i> Logs
                    </a>
                </li>
            </ul>
            <hr>
            <div class="sidebar-footer text-muted small">
                <div id="agent-status-indicator">
                    <i class="bi bi-circle-fill text-secondary"></i> Agent: <span id="agent-status-text">...</span>
                </div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
